<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hey Islem 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink: #d4537e;
    --deep: #993556;
    --light: #fbeaf0;
    --pale: #f4c0d1;
  }

  body {
    min-height: 100vh;
    background: #fff5f8;
    font-family: 'Lato', sans-serif;
    overflow-x: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Petal background */
  .petals-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }
  .petal {
    position: absolute;
    width: 10px; height: 14px;
    background: var(--pale);
    border-radius: 50% 0 50% 0;
    opacity: 0.5;
    animation: petalFall linear infinite;
  }

  @keyframes petalFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 0.6; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  /* Main card */
  .card {
    position: relative; z-index: 1;
    background: white;
    border-radius: 28px;
    padding: 3rem 2.5rem 2.5rem;
    max-width: 400px;
    width: 92%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(212,83,126,0.15);
    animation: cardIn 0.9s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 30px;
    background: linear-gradient(135deg, #f4c0d1, #fbeaf0, #f4c0d1);
    z-index: -1;
  }

  .gif-ring {
    width: 130px; height: 130px;
    border-radius: 50%;
    margin: 0 auto 1.4rem;
    border: 4px solid var(--pale);
    overflow: hidden;
    animation: float 3s ease-in-out infinite;
    box-shadow: 0 8px 30px rgba(212,83,126,0.2);
  }
  .gif-ring img { width: 100%; height: 100%; object-fit: cover; }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }

  .hey {
    font-family: 'Dancing Script', cursive;
    font-size: 44px;
    color: var(--pink);
    line-height: 1.1;
    animation: fadeSlide 0.8s 0.3s both;
  }
  .tagline {
    font-size: 14px;
    color: #b08090;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 6px 0 22px;
    font-weight: 300;
    animation: fadeSlide 0.8s 0.5s both;
  }
  .question {
    font-family: 'Dancing Script', cursive;
    font-size: 28px;
    color: var(--deep);
    margin-bottom: 28px;
    animation: pulse 2.4s ease-in-out infinite, fadeSlide 0.8s 0.7s both;
  }
  @keyframes pulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.03)} }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; animation: fadeSlide 0.8s 0.9s both; }

  .btn-yes {
    background: var(--pink);
    color: white;
    border: none;
    padding: 14px 36px;
    border-radius: 50px;
    font-size: 18px;
    font-family: 'Dancing Script', cursive;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
    box-shadow: 0 6px 20px rgba(212,83,126,0.35);
  }
  .btn-yes:hover { transform: scale(1.1); background: var(--deep); box-shadow: 0 8px 28px rgba(153,53,86,0.4); }

  .btn-no {
    background: transparent;
    color: #b08090;
    border: 1.5px solid var(--pale);
    padding: 14px 36px;
    border-radius: 50px;
    font-size: 16px;
    font-family: 'Dancing Script', cursive;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s;
    position: relative;
  }

  /* YES screen */
  #yes-screen {
    display: none;
    animation: fadeSlide 0.7s ease both;
  }
  #yes-screen.show { display: block; }
  #main-content.hide { display: none; }

  .big-emoji { font-size: 68px; animation: heartbeat 1s ease-in-out infinite; }
  @keyframes heartbeat { 0%,100%{transform:scale(1)}50%{transform:scale(1.2)} }

  .yes-title {
    font-family: 'Dancing Script', cursive;
    font-size: 38px;
    color: var(--pink);
    margin: 0.4rem 0 0.3rem;
  }
  .yes-sub { font-size: 14px; color: #b08090; line-height: 1.6; margin-bottom: 1.2rem; }

  .confetti-canvas {
    position: fixed; inset: 0; pointer-events: none; z-index: 999;
  }
</style>
</head>
<body>

<div class="petals-bg" id="petals"></div>
<canvas class="confetti-canvas" id="confetti"></canvas>

<div class="card">
  <div id="main-content">
    <div class="gif-ring">
      <img src="https://media.tenor.com/EBV7OT7ACfwAAAAj/u-u-qua-qua-u-quaa.gif" alt="cute"/>
    </div>
    <div class="hey">Hey Islem 🌸</div>
    <div class="tagline">I have something important to ask you...</div>
    <div class="question">Will you go on a date with me? 💕</div>
    <div class="btns">
      <button class="btn-yes" onclick="sayYes()">Yes, of course! 🥰</button>
      <button class="btn-no" id="noBtn" onclick="moveNo()">Maybe not...</button>
    </div>
  </div>

  <div id="yes-screen">
    <div class="big-emoji">💖</div>
    <div class="yes-title">She said YES! 🎉</div>
    <p class="yes-sub">You've made me the happiest person alive, Islem!<br>Get ready for the best date ever ✨</p>
    <img src="https://media.tenor.com/2uSIfVHSIQ0AAAAj/love-heart.gif" alt="love" style="width:110px;border-radius:12px;"/>
  </div>
</div>

<script>
  // Floating petals
  const pb = document.getElementById('petals');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = Math.random() * 100 + '%';
    p.style.animationDuration = (4 + Math.random() * 6) + 's';
    p.style.animationDelay = (Math.random() * 6) + 's';
    p.style.transform = 'rotate(' + Math.random()*360 + 'deg)';
    p.style.width = (8 + Math.random() * 8) + 'px';
    pb.appendChild(p);
  }

  // No button trickery
  let noCount = 0;
  const noLabels = ["Nope, try again! 😅", "Are you sure?? 🥺", "Come on... 🙏", "Okay fine... YES 😆"];
  const noBtn = document.getElementById('noBtn');

  function moveNo() {
    noCount++;
    if (noCount >= 4) { noBtn.textContent = "Okay fine... YES 😆"; noBtn.onclick = sayYes; return; }
    noBtn.textContent = noLabels[noCount - 1];
    noBtn.style.transform = 'translate(' + (Math.random()*80-40) + 'px,' + (Math.random()*30-15) + 'px)';
    setTimeout(() => { noBtn.style.transform = ''; }, 400);
  }

  function sayYes() {
    document.getElementById('main-content').classList.add('hide');
    document.getElementById('yes-screen').classList.add('show');
    launchConfetti();
  }

  // Simple confetti
  function launchConfetti() {
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const colors = ['#d4537e','#f4c0d1','#fbeaf0','#993556','#ff9ebe','#fff'];
    const pieces = Array.from({length: 120}, () => ({
      x: Math.random() * canvas.width,
      y: -10,
      r: 4 + Math.random() * 6,
      d: 1 + Math.random() * 3,
      c: colors[Math.floor(Math.random() * colors.length)],
      vx: Math.random() * 4 - 2,
      rot: Math.random() * 360,
      rspeed: Math.random() * 4 - 2
    }));
    let frame = 0;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pieces.forEach(p => {
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180);
        ctx.fillStyle = p.c; ctx.fillRect(-p.r/2, -p.r/2, p.r, p.r * 0.6);
        ctx.restore();
        p.y += p.d; p.x += p.vx; p.rot += p.rspeed;
      });
      frame++;
      if (frame < 180) requestAnimationFrame(draw);
      else ctx.clearRect(0,0,canvas.width,canvas.height);
    }
    draw();
  }
</script>
</body>
</html>
